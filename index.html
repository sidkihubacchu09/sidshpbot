<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amz-orange: #ff9900; --amz-blue: #232f3e; --gray: #f3f3f3; }
        body { font-family: sans-serif; background: var(--gray); margin: 0; padding-bottom: 70px; }
        .header { background: var(--amz-blue); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .header h1 { font-size: 18px; margin: 0; color: var(--amz-orange); }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .p-info { padding: 8px; flex-grow: 1; }
        .p-title { font-size: 13px; height: 32px; overflow: hidden; margin-bottom: 5px; }
        .p-price { font-size: 16px; font-weight: bold; color: #B12704; }
        
        .btn { background: var(--amz-orange); border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }
        .nav-footer { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { border: none; background: none; color: #555; text-align: center; }
        .nav-item.active { color: var(--amz-orange); }
        .modal { position: fixed; top: 0; background: rgba(0,0,0,0.8); width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; width: 85%; border-radius: 10px; }
        input { width: 92%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Welcome Sid Store</h1>
        <div id="top-bal" style="font-weight:bold">$0.00</div>
    </div>

    <!-- HOME TAB -->
    <div id="tab-home">
        <div class="product-grid" id="grid"></div>
    </div>

    <!-- WALLET TAB -->
    <div id="tab-wallet" class="hidden" style="padding: 15px;">
        <div class="card" style="padding: 20px; text-align: center;">
            <h3>Deposit via UPI</h3>
            <p>Pay to: <b id="upi-id-display" style="color:var(--amz-blue)">loading...</b></p>
            <input type="number" id="dep-amt" placeholder="Amount ($/₹)">
            <input type="text" id="dep-utr" placeholder="12-Digit UPI UTR No.">
            <button class="btn" onclick="submitDeposit()">Submit Payment</button>
        </div>
    </div>

    <!-- SELL MODAL -->
    <div id="sellModal" class="modal">
        <div class="modal-content">
            <h3>List Your ID</h3>
            <input type="text" id="s-title" placeholder="Title">
            <input type="number" id="s-price" placeholder="Price">
            <input type="text" id="s-img" placeholder="Image URL">
            <button class="btn" onclick="listNow()">List Now</button>
            <button onclick="toggleSell(false)" style="background:none; border:none; margin-top:10px; width:100%">Cancel</button>
        </div>
    </div>

    <button onclick="toggleSell(true)" style="position:fixed; bottom:80px; right:20px; background:var(--amz-orange); color:white; border:none; width:50px; height:50px; border-radius:50%; font-size:24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">+</button>

    <div class="nav-footer">
        <button class="nav-item active" id="n-home" onclick="showTab('home')"><i class="fas fa-home"></i><br>Home</button>
        <button class="nav-item" id="n-wallet" onclick="showTab('wallet')"><i class="fas fa-wallet"></i><br>Wallet</button>
        <button class="nav-item" onclick="tg.close()"><i class="fas fa-times"></i><br>Exit</button>
    </div>

<script>
    let tg = window.Telegram.WebApp;
    let userId = tg.initDataUnsafe?.user?.id || 12345;
    const API = ""; // Keep empty for Railway if serving static files

    async function init() {
        const r = await fetch(`/api/init`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: userId, username: tg.initDataUnsafe?.user?.first_name })
        });
        const d = await r.json();
        document.getElementById('top-bal').innerText = `$${d.user.balance.toFixed(2)}`;
        document.getElementById('upi-id-display').innerText = d.upi;
        render(d.market);
    }

    function render(items) {
        const g = document.getElementById('grid');
        g.innerHTML = "";
        items.forEach(i => {
            g.innerHTML += `<div class="card">
                <img src="${i.image}">
                <div class="p-info">
                    <div class="p-title">${i.title}</div>
                    <div class="p-price">$${i.price}</div>
                    <button class="btn" onclick="buy(${i.id})">Buy Now</button>
                </div>
            </div>`;
        });
    }

    async function submitDeposit() {
        const amount = document.getElementById('dep-amt').value;
        const utr = document.getElementById('dep-utr').value;
        await fetch('/api/deposit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId, amount, utr, username: tg.initDataUnsafe?.user?.first_name })
        });
        alert("Request Sent! Waiting for Verification.");
    }

    async function buy(itemId) {
        const r = await fetch('/api/buy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ buyerId: userId, itemId })
        });
        if(r.ok) { alert("Success!"); init(); } else { alert("Check Balance"); }
    }

    function showTab(t) {
        document.getElementById('tab-home').classList.toggle('hidden', t !== 'home');
        document.getElementById('tab-wallet').classList.toggle('hidden', t !== 'wallet');
        document.getElementById('n-home').classList.toggle('active', t === 'home');
        document.getElementById('n-wallet').classList.toggle('active', t === 'wallet');
    }

    function toggleSell(s) { document.getElementById('sellModal').style.display = s ? 'flex' : 'none'; }

    async function listNow() {
        const title = document.getElementById('s-title').value;
        const price = document.getElementById('s-price').value;
        const image = document.getElementById('s-img').value;
        await fetch('/api/sell', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ sellerId: userId, title, price, image })
        });
        toggleSell(false); init();
    }

    tg.expand();
    init();
</script>
</body>
</html>
